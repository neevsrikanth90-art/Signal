<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fafafa; color: #18181b; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; gap: 16px; }
    h1 { font-size: 22px; font-weight: 600; }
    p.sub { font-size: 14px; color: #71717a; text-align: center; max-width: 380px; line-height: 1.6; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; width: 100%; max-width: 380px; }
    .hint { font-size: 12px; color: #a1a1aa; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <h1 id="rage-target">Signal Test Page</h1>
  <p class="sub">Wait 60s for idle, rage-click this heading 3× quickly, or use the ? button.</p>
  <div class="card">
    <p class="hint">Replace data-key with a real key from the projects table.</p>
  </div>
  <script
    src="/signal.js"
    data-key="sk_test_replace_me"
  ></script>
</body>
</html>
